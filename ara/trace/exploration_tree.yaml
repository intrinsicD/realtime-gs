tree:
  - id: N01
    type: question
    title: "Depth covariance causal ablation"
    provenance: user
    timestamp: "2026-07-14T21:55+02:00"
    description: >
      Holding fitted 2D primitives, sampled depths, lifted means, colors, opacity, merging,
      refinement, and seeds fixed, compare surface-Jacobian covariance, per-Gaussian footprint
      depth spread, and a global isotropic along-ray thickness on CPU.
    status: resolved
    children:
      - id: N02
        type: experiment
        title: "Tiny held-out covariance probe"
        provenance: ai-executed
        timestamp: "2026-07-14T21:55+02:00"
        result: >
          On seed 0 with 25 GT Gaussians, eight 32x32 views (six train/two test), 120 fitted
          Gaussians per train view, merging disabled, opacity 0.1, and 40 no-density SH0
          refinement steps, held-out init-to-final PSNR was surface 20.314-to-25.293 dB,
          footprint 21.455-to-25.572 dB, and a one-pixel z/f ray thickness
          21.336-to-25.567 dB. Surface p99 covariance condition number was about 1.49e6,
          versus 19.5 for footprint and 3.16 for z/f.
        evidence:
          - "ara/evidence/tables/depth_covariance_probes.md#tiny-held-out-probe"
        status: resolved
      - id: N03
        type: experiment
        title: "Canonical-size global-sigma pilot"
        provenance: ai-executed
        timestamp: "2026-07-14T21:55+02:00"
        result: >
          On seed 0 with 40 GT Gaussians, twelve 48x48 views (nine train/three test), shared
          150-Gaussian 120-step fits, and merging disabled, train-only selection over
          {0.5,1,2} times footprint RMS sigma chose global sigma 0.07150. Held-out init
          PSNR/SSIM was surface 19.584/0.371, footprint 20.450/0.588, and selected global
          isotropic 20.949/0.750. This is a one-seed pilot, not a default-setting result.
        evidence:
          - "ara/evidence/tables/depth_covariance_probes.md#canonical-size-global-sigma-pilot"
        status: resolved
      - id: N04
        type: experiment
        title: "Three-seed raw covariance replication"
        provenance: ai-executed
        timestamp: "2026-07-14T22:18+02:00"
        result: >
          With identical train-view fits, held-out cameras, merging disabled, and seeds
          0/1/2, raw mean initialization PSNR was isotropic 20.985 dB, footprint 20.722 dB,
          and surface 19.744 dB. Raw surface p99 covariance condition averaged 1.76e6 and
          maximum scale reached 3.16 times scene extent.
        evidence:
          - "benchmarks/results/20260714T195655Z_cpu_depth_covariance_iter2_raw.json"
          - "ara/evidence/tables/depth_covariance_probes.md#official-three-iteration-ablation"
        status: resolved
      - id: N05
        type: experiment
        title: "Validity-aware clean-depth replication"
        provenance: ai-executed
        timestamp: "2026-07-14T22:18+02:00"
        result: >
          Validity-aware finite differences raised mean surface initialization from 19.744
          to 21.195 dB and reduced p99 condition from 1.76e6 to 721. After 60 equal
          no-density refinement steps, footprint/isotropic/surface reached
          26.251/26.206/26.040 dB, below the predeclared 0.25 dB separation.
        evidence:
          - "benchmarks/results/20260714T195727Z_cpu_depth_covariance_iter2_robust.json"
          - "benchmarks/results/20260714T200932Z_cpu.json"
        status: resolved
      - id: N06
        type: experiment
        title: "Perturbed-depth falsification run"
        provenance: ai-executed
        timestamp: "2026-07-14T22:18+02:00"
        result: >
          Under masked 3x3 blur plus deterministic 2 percent depth noise, robust surface led
          initialization at 21.086 dB versus isotropic 20.940 and footprint 20.881, but after
          60 steps isotropic led at 26.002 versus surface 25.918 and footprint 25.901.
        evidence:
          - "benchmarks/results/20260714T195902Z_cpu_depth_covariance_iter3_noise.json"
        status: resolved
      - id: N07
        type: dead_end
        title: "Density surgery on final evaluation step"
        provenance: ai-executed
        timestamp: "2026-07-14T22:18+02:00"
        hypothesis: >
          An 80-step merge+density run would fairly measure the production interaction.
        failure_mode: >
          Classic density surgery fired at step 80 and evaluation happened immediately,
          collapsing every arm before any recovery optimization.
        lesson: >
          Do not compare final quality at a density-surgery step; reserve recovery steps
          before evaluation.
        evidence:
          - "benchmarks/results/20260714T195958Z_cpu_depth_covariance_iter3_production.json"
        status: resolved
      - id: N08
        type: experiment
        title: "Corrected merge-density recovery run"
        provenance: ai-executed
        timestamp: "2026-07-14T22:18+02:00"
        result: >
          Extending the perturbed-depth production run to 100 steps gave 20 recovery steps
          after density surgery. Train-tuned isotropic won all three seeds at 27.047 dB mean
          held-out PSNR, ahead of footprint 26.485 and surface 26.280.
        evidence:
          - "benchmarks/results/20260714T200107Z_cpu_depth_covariance_iter3_recovery.json"
        status: resolved
      - id: N09
        type: decision
        title: "Default to validity-aware depth gradients"
        provenance: ai-executed
        timestamp: "2026-07-14T22:18+02:00"
        choice: >
          Treat zero/NaN depth as invalid during finite differences and make this behavior
          the depth-lifting default.
        alternatives:
          - "Retain legacy central differences across invalid background"
          - "Clamp all depth slopes without distinguishing invalid samples"
        evidence: [N04, N05, N06]
        status: resolved
      - id: N10
        type: decision
        title: "Retain pluggable covariance modes"
        provenance: ai-executed
        timestamp: "2026-07-14T22:18+02:00"
        choice: >
          Keep surface as the production default while exposing footprint and explicitly
          sized global isotropic controls; defer a mode switch until real-depth evidence.
        alternatives:
          - "Switch the default to train-tuned isotropic from synthetic results"
          - "Switch the default to footprint from clean short-refinement results"
        evidence: [N05, N06, N08]
        status: resolved
  - id: N11
    type: question
    title: "Leave-one-source-view-out ray optimization"
    provenance: ai-suggested
    timestamp: "2026-07-14T22:59+02:00"
    description: >
      Does retaining source-view provenance and excluding or downweighting a target view's own
      fitted splats during GradientLifter supervision improve depth geometry, merge rate, and
      held-out initialization quality under an equal CPU iteration budget?
    status: resolved
    children:
      - id: N27
        type: experiment
        title: "Preregistered source-aware supervision ablation"
        provenance: ai-executed
        timestamp: "2026-07-15T08:34+02:00"
        result: >
          Across seeds 0/1/2, Gradient LOSO improved held-out depth RMSE by 0.149 percent
          but worsened all-source p90 by 0.515 percent. Corrupted-depth Hybrid LOSO worsened
          held-out RMSE by 0.009 percent, all-source p90 by 2.312 percent, and
          corrupted-source p90 by 1.364 percent. Both materiality and matched-control
          attribution gates failed; initialization, paired schedules, balanced exposure,
          output counts, finite values, and source-bound provenance all passed independent audit.
        evidence:
          - "benchmarks/results/20260715T062601Z_cpu_cross_view_supervision.json"
          - "benchmarks/results/20260715_cross_view_supervision_PREREG.md"
          - "benchmarks/results/20260715_cross_view_supervision_RESULT.md"
          - "ara/evidence/tables/cross_view_supervision.md"
        status: resolved
      - id: N28
        type: dead_end
        title: "Own-source exclusion as a material geometry improvement"
        provenance: ai-executed
        timestamp: "2026-07-15T08:34+02:00"
        hypothesis: >
          Removing each target view's own fitted splats from photometric supervision would
          expose enough cross-view signal to materially improve held-out depth RMSE and robust
          source-depth tails in both Gradient and corrupted-depth Hybrid lifting.
        failure_mode: >
          Gradient's 0.149 percent RMSE improvement missed the 2 percent floor and its source
          p90 worsened; Hybrid worsened all three primary geometry metrics. Small cross-only L1
          and nearest-median gains did not propagate to the preregistered held-out and tail gates.
        lesson: >
          Stop LOSO, matched-dropout, and schedule sweeps on this frozen setup. The result rules
          out a material own-view-shortcut benefit here, not source exclusion or photometric
          underidentification universally.
        evidence:
          - "benchmarks/results/20260715T062601Z_cpu_cross_view_supervision.json"
          - "benchmarks/results/20260715_cross_view_supervision_RESULT.md"
        status: resolved
      - id: N29
        type: decision
        title: "Keep inclusive photometric supervision as default"
        provenance: ai-executed
        timestamp: "2026-07-15T08:34+02:00"
        choice: >
          Preserve inclusive all-source training as the production default, retain LOSO and
          globally balanced matched non-self dropout as reproducible research controls, and close
          further source-exclusion sweeps under the frozen synthetic protocol.
        alternatives:
          - "Switch the production default to LOSO"
          - "Tune LOSO schedules, dropout assignments, or loss weights on the same setup"
          - "Remove the source-aware research controls after the negative result"
        evidence: [N27, N28, "benchmarks/results/20260715_cross_view_supervision_RESULT.md"]
        status: resolved
      - id: N30
        type: pivot
        title: "Pivot from photometric exclusion to direct position consistency"
        provenance: ai-executed
        timestamp: "2026-07-15T08:34+02:00"
        from: "Leave-one-source-view-out and matched-dropout photometric supervision"
        to: >
          One direct robust world-frame position-consistency term between fixed train-view
          matches while retaining bounded-ray depths; test position alone before shape,
          appearance, confidence, or plane/normal consistency.
        trigger: >
          N27/N28 fired the preregistered stopping rule. MAC-Splat's matched world-frame
          consistency and EDGS-style direct correspondence motivate the next hypothesis but do
          not prescribe this repository's matches, robust loss, weight, or thresholds.
        evidence:
          - N27
          - N28
          - "docs/RESEARCH.md#42-scholar-inbox-update-2026-07-15"
        also_depends_on: [N12, N26]
        status: resolved
        children:
          - id: N31
            type: question
            title: "Fixed-match world-frame position consistency"
            provenance: ai-suggested
            timestamp: "2026-07-15T08:34+02:00"
            description: >
              Does adding one robust position-only loss between fixed cross-view training matches
              materially improve held-out depth RMSE and source tails over photometric-only
              bounded-ray optimization, and does a shuffled-match control with the same pair count
              and graph degree remove the gain?
            status: resolved
            children:
              - id: N32
                type: experiment
                title: "Preregistered fixed-match position-consistency run"
                provenance: ai-executed
                timestamp: "2026-07-15T10:58+02:00"
                result: >
                  Across seeds 0/1/2, correct topology reduced matched-edge p90 by 91.11
                  percent in Gradient and 86.44 percent in corrupted-depth Hybrid, and reduced
                  represented-node assigned-GT p90 by 90.00 and 82.42 percent. Whole-scene
                  held-out RMSE improved only 0.896/1.005 percent, all-source p90
                  6.499/5.865 percent, and Hybrid corrupted-source p90 5.689 percent, below
                  every frozen materiality floor. All provenance and structural audits passed.
                evidence:
                  - "benchmarks/results/20260715T084557Z_cpu_world_position_consistency.json"
                  - "benchmarks/results/20260715_world_position_consistency_PREREG.md"
                  - "benchmarks/results/20260715_world_position_consistency_RESULT.md"
                  - "ara/evidence/tables/world_position_consistency.md"
                status: resolved
              - id: N33
                type: dead_end
                title: "Sparse oracle position graph as a material whole-scene improvement"
                provenance: ai-executed
                timestamp: "2026-07-15T10:58+02:00"
                hypothesis: >
                  A clean fixed correspondence graph over high-purity train-view primitives would
                  make the position-only loss materially improve held-out and source-tail geometry.
                failure_mode: >
                  The loss strongly localized represented primitives in every seed, but the graph
                  touched only 7.73 to 9.43 percent of retained primitives and all whole-scene
                  gains remained below the preregistered thresholds.
                lesson: >
                  Do not tune the position loss. Test coverage once with a denser train-only
                  matcher; if a precise dense graph still fails globally, pivot to local
                  plane/normal consistency.
                evidence:
                  - N32
                  - "benchmarks/results/20260715_world_position_consistency_RESULT.md"
                status: resolved
              - id: N34
                type: decision
                title: "Keep position consistency opt-in and stop loss sweeps"
                provenance: ai-executed
                timestamp: "2026-07-15T10:58+02:00"
                choice: >
                  Preserve zero position weight and inclusive photometric supervision as defaults;
                  retain explicit fixed pairs as a research API, make no deployment claim, and
                  stop coefficient, Huber delta, norm, and schedule sweeps on this setup.
                alternatives:
                  - "Enable the sparse oracle-motivated loss by default"
                  - "Tune the position-loss coefficient or robust-loss shape"
                  - "Add shape and appearance consistency before testing coverage"
                evidence: [N32, N33, "benchmarks/results/20260715_world_position_consistency_RESULT.md"]
                status: resolved
              - id: N35
                type: pivot
                title: "Pivot from sparse oracle edges to denser train-only matching"
                provenance: ai-executed
                timestamp: "2026-07-15T10:58+02:00"
                from: "Sparse privileged fixed-position graph and position-loss hyperparameter branch"
                to: >
                  One denser train-only correspondence graph with the same frozen bounded-ray
                  position loss and structurally matched shuffled control.
                trigger: >
                  N32 passed engagement and local localization in both families but failed global
                  materiality, firing the preregistered coverage-limited branch.
                evidence: [N32, N33, N34]
                also_depends_on: [N30]
                status: resolved
                children:
                  - id: N36
                    type: question
                    title: "Dense train-only correspondence coverage"
                    provenance: ai-suggested
                    timestamp: "2026-07-15T10:58+02:00"
                    description: >
                      Can a frozen, pluggable train-image matcher with mutual-confidence,
                      reprojection, and ray-angle filtering materially exceed the current 8.4
                      percent represented-node coverage while retaining enough precision for the
                      unchanged position loss to improve whole-scene geometry?
                    status: resolved
                    children:
                      - id: N37
                        type: experiment
                        title: "Preregistered dense train-only matcher gate"
                        provenance: ai-executed
                        timestamp: "2026-07-15T11:50+02:00"
                        result: >
                          Across seeds 0/1/2, the frozen raw-patch/epipolar matcher passed every
                          structural floor with 165 to 187 edges, 227 to 247 represented nodes,
                          17.99 to 19.10 percent node coverage, and 1.91x to 2.47x the sparse
                          oracle's same-seed coverage. Strict compositor-identity edge precision
                          was only 9.04, 11.76, and 10.91 percent versus the frozen 60 percent
                          floor. The official harness therefore stopped before every Gradient and
                          Hybrid optimization arm.
                        evidence:
                          - "benchmarks/results/20260715T094311Z_cpu_dense_train_position.json"
                          - "benchmarks/results/20260715_dense_train_position_PREREG.md"
                          - "benchmarks/results/20260715_dense_train_position_RESULT.md"
                          - "ara/evidence/tables/dense_train_position.md"
                        status: resolved
                      - id: N38
                        type: dead_end
                        title: "Raw RGB patch matching as a valid fitted-primitive graph"
                        provenance: ai-executed
                        timestamp: "2026-07-15T11:50+02:00"
                        hypothesis: >
                          Reciprocal distinctive 5x5 RGB patches plus calibrated epipolar,
                          cheirality, ray-angle, and reprojection filters would yield a dense graph
                          precise enough to run the frozen position-consistency arms.
                        failure_mode: >
                          Only 17.15 to 22.27 percent of represented nodes had a valid dominant
                          reference-compositor label. Precision among fully labeled pairs was
                          70.97 to 80.00 percent, but counting unlabeled/background endpoints false
                          reduced strict precision to 9.04 to 11.76 percent in every seed.
                        lesson: >
                          Calibration and raw local appearance do not establish meaningful fitted-
                          primitive identity in low-signal regions. Do not tune this matcher or
                          feed its graph to the position loss after the failed frozen gate.
                        evidence:
                          - N37
                          - "benchmarks/results/20260715_dense_train_position_RESULT.md"
                        status: resolved
                      - id: N39
                        type: decision
                        title: "Retain the matcher as a rejected CPU reference"
                        provenance: ai-executed
                        timestamp: "2026-07-15T11:50+02:00"
                        choice: >
                          Keep the pluggable train-only matcher boundary and deterministic tests as
                          research infrastructure, but withhold all position-optimization arms,
                          make no production or learned-matcher claim, and stop patch/position
                          threshold sweeps on this outcome.
                        alternatives:
                          - "Run the position arms despite the failed precision gate"
                          - "Tune patch, ratio, epipolar, reprojection, confidence, or loss settings"
                          - "Promote the raw-patch backend to a production matcher"
                        evidence: [N37, N38, "benchmarks/results/20260715_dense_train_position_RESULT.md"]
                        status: resolved
                      - id: N40
                        type: pivot
                        title: "Pivot from raw matching to depth-backed plane and normal constraints"
                        provenance: ai-executed
                        timestamp: "2026-07-15T11:50+02:00"
                        from: "Raw-patch train-only matching and the fixed-position branch"
                        to: >
                          One frozen local plane-pulling plus shortest-axis normal-alignment test
                          against detached train-depth oriented points, initially scoped to Hybrid.
                        trigger: >
                          N37/N38 fired the preregistered matcher-precision stopping rule. Scholar
                          Inbox's Incremental Gaussian Triangulation supplies the bounded plane and
                          normal mechanism but assumes RGB-D oriented points.
                        evidence:
                          - N37
                          - N38
                          - "docs/RESEARCH.md#41-scholar-inbox-update-2026-07-14"
                        also_depends_on: [N33, N35]
                        status: resolved
                        children:
                          - id: N41
                            type: question
                            title: "Depth-backed local plane and normal consistency"
                            provenance: ai-suggested
                            timestamp: "2026-07-15T11:50+02:00"
                            description: >
                              Do detached train-depth oriented points provide a precise local plane
                              target whose point-to-plane pulling and shortest-axis normal alignment
                              materially improve corrupted-depth Hybrid geometry under a frozen,
                              attribution-controlled protocol?
                            status: resolved
                            children:
                              - id: N42
                                type: experiment
                                title: "Preregistered surface-target validity gate"
                                provenance: ai-executed
                                timestamp: "2026-07-15T13:09+02:00"
                                result: >
                                  Across seeds 0/1/2, frozen four-neighbor corrupted-depth plane
                                  targets passed every structural floor with 318 to 339 targets,
                                  24.59 to 26.02 percent retained-node coverage, and 67 to 98
                                  corrupted targets. The post-freeze clean audit failed every seed:
                                  all-target plane p90 was 0.160 to 0.175 of extent and corrupted-
                                  target p90 was 0.239 to 0.271 versus the 0.10 ceiling. Every
                                  target was labelable. The official harness therefore ran zero of
                                  the five planned Hybrid optimization arms.
                                evidence:
                                  - "benchmarks/results/20260715T110342Z_cpu_surface_plane_normal.json"
                                  - "benchmarks/results/20260715_surface_plane_normal_PREREG.md"
                                  - "benchmarks/results/20260715_surface_plane_normal_RESULT.md"
                                  - "ara/evidence/tables/surface_plane_normal.md"
                                status: resolved
                              - id: N43
                                type: dead_end
                                title: "Four-neighbor corrupted-depth PCA as an oriented-point source"
                                provenance: ai-executed
                                timestamp: "2026-07-15T13:09+02:00"
                                hypothesis: >
                                  Spatially compact, cross-view, multi-support PCA neighborhoods
                                  passing planarity, incidence, and ray-reachability filters would
                                  provide sufficiently accurate fixed surface planes for corrupted-
                                  depth Hybrid optimization.
                                failure_mode: >
                                  Although every structural proxy passed, clean point-to-plane p90
                                  exceeded the frozen 0.10 limit in both strata and all seeds;
                                  normal agreement also failed some seed/stratum checks.
                                lesson: >
                                  Locality and a small PCA eigenvalue do not establish surface
                                  identity under corrupted depth. Reject this constructor without
                                  threshold tuning and do not expose the withheld utility arms.
                                evidence:
                                  - N42
                                  - "benchmarks/results/20260715_surface_plane_normal_RESULT.md"
                                status: resolved
                              - id: N44
                                type: decision
                                title: "Retain disabled surface losses and reject the target constructor"
                                provenance: ai-executed
                                timestamp: "2026-07-15T13:09+02:00"
                                choice: >
                                  Keep the tested retained-indexed point-to-plane and selected-axis
                                  normal API with zero coefficients, reject the four-neighbor
                                  corrupted-depth constructor, run no withheld arm, and make no
                                  production or loss-utility claim.
                                alternatives:
                                  - "Tune target radius, neighbor count, planarity, or audit gates"
                                  - "Run the five Hybrid arms despite the failed clean audit"
                                  - "Remove the generic loss API even though it was not evaluated"
                                evidence: [N42, N43, "benchmarks/results/20260715_surface_plane_normal_RESULT.md"]
                                status: resolved
                              - id: N45
                                type: pivot
                                title: "Pivot from synthetic neighbor planes to calibrated oriented points"
                                provenance: ai-executed
                                timestamp: "2026-07-15T13:09+02:00"
                                from: "Four-neighbor cross-view PCA planes built from corrupted synthetic depth"
                                to: >
                                  An independently justified pluggable oriented-point source on
                                  actual calibrated metric-depth/RGB-D data, audited before any
                                  plane or normal optimization.
                                trigger: >
                                  N42/N43 fired the preregistered post-freeze validity stop. IGT's
                                  positive mechanism assumes oriented RGB-D points rather than this
                                  repository-specific corrupted-depth nearest-neighbor adaptation.
                                evidence:
                                  - N42
                                  - N43
                                  - "docs/RESEARCH.md#43-oriented-point-experiment-update-2026-07-15"
                                also_depends_on: [N40]
                                status: resolved
                                children:
                                  - id: N46
                                    type: question
                                    title: "Calibrated oriented-point backend validity and utility"
                                    provenance: ai-suggested
                                    timestamp: "2026-07-15T13:09+02:00"
                                    description: >
                                      Can a pluggable source of independently justified metric
                                      points and normals on actual calibrated depth/RGB-D data pass
                                      a leakage-safe target audit and then make point-to-plane and
                                      shortest-axis alignment materially improve Hybrid geometry?
                                    status: resolved
                                    children:
                                      - id: N47
                                        type: experiment
                                        title: "Sealed real RGB-D oriented-point transfer audit"
                                        provenance: ai-executed
                                        timestamp: "2026-07-15T16:51+02:00"
                                        result: >
                                          The TUM fr1/xyz development run constructed 40,341
                                          eligible targets with 86.69 percent two-view oriented
                                          support, 24.97 mm surface p90, 3.10 percent relative-
                                          depth p90, and 0.915 median normal cosine. The sole
                                          fr1/desk confirmatory run retained 39,422 targets and
                                          80.36 percent support, but failed transferred surface
                                          p90 at 202.11 mm versus 42.45 mm, relative-depth p90 at
                                          25.19 percent versus 5 percent, and p10 normal cosine at
                                          0.503 versus 0.522. Six other gates passed; decision was
                                          stop and no Phase-B arm ran.
                                        evidence:
                                          - "benchmarks/results/20260715T143959Z_cpu_tum_rgbd_oriented_validity_xyz.json"
                                          - "benchmarks/results/20260715T144052Z_cpu_tum_rgbd_oriented_validity_desk.json"
                                          - "benchmarks/results/20260715_tum_rgbd_oriented_validity_THRESHOLDS.json"
                                          - "benchmarks/results/20260715_tum_rgbd_oriented_validity_RESULT.md"
                                          - "ara/evidence/tables/tum_rgbd_oriented_validity.md"
                                        status: resolved
                                      - id: N48
                                        type: dead_end
                                        title: "Registered-depth targets as a transferable Phase-B prerequisite"
                                        provenance: ai-executed
                                        timestamp: "2026-07-15T16:51+02:00"
                                        hypothesis: >
                                          Registered metric depth plus deterministic five-point
                                          normals and construction-only sparse visibility would
                                          yield oriented targets whose cross-view tail validity
                                          transfers from fr1/xyz to fr1/desk.
                                        failure_mode: >
                                          Coverage and two-view support transferred, but desk
                                          target-level depth and symmetric surface residuals were
                                          strongly heavy-tailed: p90 reached 25.19 percent and
                                          202.11 mm, and low-tail normal agreement also missed its
                                          frozen floor.
                                        lesson: >
                                          Plentiful local metric normals do not establish
                                          transferable cross-view tail consistency. Withhold
                                          plane/normal utility, do not tune the consumed desk
                                          case, and isolate occlusion/rigidity on new sequences.
                                        evidence:
                                          - N47
                                          - "benchmarks/results/20260715_tum_rgbd_oriented_validity_RESULT.md"
                                        status: resolved
                                      - id: N49
                                        type: decision
                                        title: "Retain the backend boundary and withhold Phase B"
                                        provenance: ai-executed
                                        timestamp: "2026-07-15T16:51+02:00"
                                        choice: >
                                          Keep the CPU-tested oriented-point protocol,
                                          canonicalization, registered-depth normal utility, and
                                          zero-default losses; keep the TUM backend harness-local,
                                          run no Phase-B optimization, and make no utility or
                                          production claim.
                                        alternatives:
                                          - "Run plane/normal optimization despite failed target gates"
                                          - "Relax p90 or low-tail normal thresholds on desk"
                                          - "Promote the harness-local TUM backend to production"
                                          - "Remove the generic API even though its boundary is tested"
                                        evidence: [N47, N48, "benchmarks/results/20260715_tum_rgbd_oriented_validity_RESULT.md"]
                                        status: resolved
                                      - id: N50
                                        type: pivot
                                        title: "Pivot from oriented-loss utility to occlusion and rigidity attribution"
