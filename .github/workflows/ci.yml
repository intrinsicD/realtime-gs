name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,benchmark]' --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Tests (CPU, not slow)
        run: pytest -q -m "not slow"
      - name: Docs sync
        run: python scripts/docs_sync.py
      - name: Benchmark smoke (quick, no docs update)
        run: python benchmarks/run.py --quick --smoke
